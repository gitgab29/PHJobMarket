# Production stack — lean enough for a 1 GB AWS free-tier box.
# Three services only: postgres + django(gunicorn) + nginx(frontend + proxy).
# Airflow is intentionally NOT here (see DEPLOY.md) — run scrape/dbt on demand.
#
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# All secrets/config come from .env.prod (copy .env.prod.example, fill in).

# Distinct project name so this never collides with the dev docker-compose.yml
# (postgres + Airflow) on the same machine.
name: phjobmarket-prod

services:

  postgres:
    image: postgres:16-alpine
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    # No host port exposed — only django (and `docker compose exec`) reach it.

  django:
    build:
      context: ./api
    env_file: .env.prod
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"          # internal only; nginx proxies to it
    restart: unless-stopped

  nginx:
    build:
      context: ./frontend
    expose:
      - "80"          # internal only; caddy terminates TLS and proxies to it
    depends_on:
      - django
    restart: unless-stopped

  # Caddy is the public entrypoint: it auto-obtains + auto-renews a Let's Encrypt
  # certificate for the domain and reverse-proxies everything to nginx over http.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # persists issued certs across restarts
      - caddy_config:/config
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  pgdata_prod:
  caddy_data:
  caddy_config:
