server {
    listen 80;
    server_name _;

    # Gzip the JS/CSS bundle (Recharts makes it chunky).
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Django API (the React app calls relative /api/v1/...) ──────────────
    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── DRF browsable-API static assets (served by WhiteNoise) ────────────
    location /static/ {
        proxy_pass http://django:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── React SPA: serve the bundle, fall back to index.html for routes ───
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
